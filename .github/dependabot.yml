version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /.github/codacy-analysis
    schedule:
      interval: weekly
    groups:
      codacy-analysis:
        patterns:
          - "*"
