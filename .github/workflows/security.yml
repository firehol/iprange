name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '23 3 * * 2'
  workflow_dispatch:

permissions: {}

jobs:
  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            clang \
            libtool \
            make \
            pkg-config

      - name: Run sanitizer suite
        run: |
          ./autogen.sh
          ./configure --disable-man
          make -j"$(nproc)"
          make check-sanitizers

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_ORGANIZATION_PROVIDER: gh
      CODACY_USERNAME: firehol
      CODACY_PROJECT_NAME: iprange
      CODACY_REPORTER_VERSION: 14.1.3
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install coverage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf \
            automake \
            build-essential \
            lcov \
            libtool \
            make \
            pkg-config

      - name: Generate LCOV report
        run: |
          ./autogen.sh
          CFLAGS='-O0 -g --coverage' LDFLAGS='--coverage' ./configure --disable-man
          make -j"$(nproc)"
          IPRANGE_BIN="$PWD/iprange" ./run-tests.sh
          BUILD_DIR="$PWD" TEST_CFLAGS='-O0 -g --coverage' TEST_LDFLAGS='--coverage' ./run-unit-tests.sh
          lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch,gcov,inconsistent
          lcov --remove coverage.info '/usr/*' '*/tests.unit/*' --output-file coverage.filtered.info --ignore-errors inconsistent,corrupt,unused
          mv coverage.filtered.info coverage.info
          lcov --summary coverage.info --ignore-errors inconsistent,corrupt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-lcov
          path: coverage.info
          retention-days: 14

      - name: Upload coverage to Codacy
        if: env.CODACY_API_TOKEN != ''
        run: |
          bash <(curl -Ls https://raw.githubusercontent.com/codacy/codacy-coverage-reporter/54617baa57421746d0afa3df32127d3dd40f3786/get.sh) report -r coverage.info

  codacy-local-analysis:
    name: Codacy local analysis ratchet
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_MAX_ISSUES: '2681'
      CODACY_MAX_ERRORS: '6'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Codacy Analysis CLI
        run: |
          npm install -g @codacy/analysis-cli

      - name: Run Codacy local analysis
        run: |
          codacy-analysis init --remote gh firehol iprange
          set +e
          codacy-analysis analyze --install-dependencies --output-format json --output codacy-analysis.json
          analysis_status=$?
          set -e
          if [ ! -f codacy-analysis.json ]; then
            exit "$analysis_status"
          fi
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('codacy-analysis.json', 'utf8'));
          const issues = Array.isArray(report.issues) ? report.issues.length : 0;
          const errors = Array.isArray(report.errors) ? report.errors.length : 0;
          const maxIssues = Number(process.env.CODACY_MAX_ISSUES);
          const maxErrors = Number(process.env.CODACY_MAX_ERRORS);
          console.log(`Codacy local analysis issues: ${issues}`);
          console.log(`Allowed baseline: ${maxIssues}`);
          console.log(`Codacy local analysis errors: ${errors}`);
          console.log(`Allowed error baseline: ${maxErrors}`);
          if (issues > maxIssues) {
            console.error(`Codacy issue count increased by ${issues - maxIssues}.`);
            process.exit(1);
          }
          if (errors > maxErrors) {
            console.error(`Codacy analysis error count increased by ${errors - maxErrors}.`);
            process.exit(1);
          }
          NODE

      - name: Upload Codacy analysis artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: codacy-analysis
          path: codacy-analysis.json
          retention-days: 14
